const BRACKET_AGES = ["U19"];
function isBracket(age){ return BRACKET_AGES.includes(age); }
function ageLabel(age){ return age==="U19" ? "U18/19" : age; }
function bracketOpponent(age, name){
  const g = teamGroup(age, name); if(!g || !GROUPS[age]) return null;
  for(const n in GROUPS[age]){ if(n!==name && GROUPS[age][n][0]===g[0]) return n; }
  return null;
}
function groupMates(age, name){
  const g = teamGroup(age, name); if(!g || !GROUPS[age]) return [];
  return Object.keys(GROUPS[age])
    .filter(n => n!==name && GROUPS[age][n][0]===g[0])
    .sort((a,b)=>GROUPS[age][a].localeCompare(GROUPS[age][b]));
}
function groupLabel(age){ return isBracket(age) ? "R16" : "Group"; }

class HomeControl {

function rankClass(r){ return r===1?"top1":r<=8?"top8":r<=16?"top16":""; }
function initials(n){ return n.replace(/[^A-Za-z ]/g,"").split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"?"; }

function buildMarkerEl(team){
  const color = CONF_COLOR[team.conf]||"#607090";
  const rc = rankClass(team.rank);
  const el = document.createElement("div");
  const __st = teamStanding(curAge, team.name);
  const __first = isLeader(curAge, team.name);
  const __nonadv = isNonAdv(curAge, team.name);
  el.className = "club-marker";
  if(__nonadv) el.setAttribute("data-nonadv","1");
  el.innerHTML = `
    <div class="cm-stack">
      ${__first ? '<div class="cm-star" title="1st in group">\u2605</div>' : ''}
      <div class="cm-circle" style="border-color:${color};">
        <img src="${team.logo}" alt=""
          onerror="this.parentElement.innerHTML='<div class=\'cm-init\' style=\'color:${color}\'>${initials(team.name)}</div>'">
      </div>
      <div class="cm-rank ${rc}">${team.rank}</div>
    </div>`;
  el.addEventListener("click",(e)=>{ e.stopPropagation(); openPopup(team); highlightEntry(team); });
  return el;
}

let popup = null;

              res = `<span class="sch-res ${cls}">${cls.toUpperCase()}</span><span class="sch-score">${gf}\u2013${ga}</span>`;
            } else {
              res = `<span class="sch-ha">${home?"vs":"@"}</span>`;
            }
            const fld = g[2].startsWith("#") ? "Field "+g[2].slice(1) : "Field "+g[2];
            return `<div class="sch-row">
              <div class="sch-dt"><b>${g[0]}</b> ${g[1]}</div>
              <div class="sch-opp">${res} ${opp}</div>
              <div class="sch-fld">${fld}${g[7]==="K"?" &middot; KO":""}</div>
            </div>`;
          }).join("");
          return `<div class="popup-sched">
            <div class="popup-grp-label">Playoff schedule${games.some(g=>g[5]!=="")?" / results":""}</div>
            ${rows}
          </div>`;
        })()}
        <a class="popup-link" href="${standingsUrl(curAge)}" target="_blank" rel="noopener">View ${ageLabel(curAge)} standings &amp; results &#8599;</a>
        <div class="popup-foot">${teamGroup(curAge,team.name)
            ? (isBracket(curAge)
                ? `Round of 16${bracketOpponent(curAge,team.name)?` &middot; vs ${bracketOpponent(curAge,team.name)}`:""} &middot; `
                : `National Playoff Group ${teamGroup(curAge,team.name)[0]} &middot; `)
            : ""}Official ${ageLabel(curAge)} Champions League standing &middot; theecnl.com</div>
      </div>`)
    .addTo(map);
}

function clearMarkers(){ markers.forEach(m=>m.marker.remove()); markers=[]; if(popup){popup.remove();popup=null;} }

function visible(team){
  if(soloConf && team.conf!==soloConf) return false;
  if(soloTranche && (team.rank<soloTranche.min || team.rank>soloTranche.max)) return false;
  if(soloGroup && (teamGroup(curAge,team.name)||"")[0]!==soloGroup) return false;
  return true;
}

function renderMarkers(){
  clearMarkers();
  DATA[curAge].forEach(team=>{
    if(!visible(team)) return;
    const el = buildMarkerEl(team);
    const marker = new mapboxgl.Marker({element:el, anchor:"center"})
      .setLngLat([team.lng,team.lat]).addTo(map);
    markers.push({team, el, marker});
  });
  // keep the ECNL venue shield above all team markers (matches initial load)
  if(map.loaded() || venueMarker) addVenueMarker();
}

function highlightEntry(team){
  document.querySelectorAll(".team-entry").forEach(e=>e.classList.remove("active"));
  const row = document.getElementById("te-"+team.rank);
  if(row){ row.classList.add("active"); row.scrollIntoView({block:"nearest"}); }
}

function renderList(){
  const wrap = document.getElementById("team-entries");
  wrap.innerHTML = "";
  let shown = 0;
  DATA[curAge].forEach(team=>{
    const passConf = !soloConf || team.conf===soloConf;
    const passTranche = !soloTranche || (team.rank>=soloTranche.min && team.rank<=soloTranche.max);
    const passGroup = !soloGroup || (teamGroup(curAge,team.name)||"")[0]===soloGroup;
    const passSearch = !searchQ || team.name.toLowerCase().includes(searchQ) || team.conf.toLowerCase().includes(searchQ);
    if(!passConf || !passTranche || !passGroup || !passSearch) return;
    shown++;
    const color = CONF_COLOR[team.conf]||"#607090";
    const rc = rankClass(team.rank);
    const div = document.createElement("div");
    div.className = "team-entry";
    div.id = "te-"+team.rank;
    div.innerHTML = `
      <div class="rank-badge ${rc}">${team.rank}</div>
      <img class="team-logo-small" src="${team.logo}" alt="" onerror="this.style.display='none'">
      <div class="team-entry-info">
        <div class="team-entry-name">${team.name}</div>
        <div class="team-entry-conf">${teamGroup(curAge,team.name) ? `${groupLabel(curAge)} ${teamGroup(curAge,team.name)} &middot; ${team.conf}` : team.conf}</div>
      </div>
      <div class="team-entry-ppg">${team.ppg.toFixed(2)}</div>`;
    div.addEventListener("click",()=>{
      if(window.matchMedia("(max-width: 768px)").matches) closeMobileDrawers();
      map.flyTo({center:[team.lng,team.lat], zoom:8.5, duration:900});
      setTimeout(()=>openPopup(team), 950);
      highlightEntry(team);
    });
    wrap.appendChild(div);
  });
  document.getElementById("team-count").textContent = shown;
}

function renderLegend(){
  const teams = DATA[curAge];
  const maxRank = teams.reduce((m,t)=>Math.max(m,t.rank),0);

  // --- Conference dropdown (counts respect active rank + group filters) ---
  const confSel = document.getElementById("filter-conf");
  const confCount = name => teams.filter(t => t.conf===name
      && (!soloTranche || (t.rank>=soloTranche.min && t.rank<=soloTranche.max))
      && (!soloGroup || (teamGroup(curAge,t.name)||"")[0]===soloGroup)).length;
  let confHtml = `<option value="">All conferences</option>`;
  CONF_ORDER.forEach(name=>{
    const c = confCount(name);
    if(c>0) confHtml += `<option value="${name}"${soloConf===name?" selected":""}>${name} (${c})</option>`;
  });
  confSel.innerHTML = confHtml;
  confSel.classList.toggle("active", !!soloConf);

  // --- Rank range dropdown ---
  const rankSel = document.getElementById("filter-rank");
  let rankHtml = `<option value="">All ranks</option>`;
  for(let start=1; start<=maxRank; start+=10){
    const end = Math.min(start+9, maxRank);
    const cnt = teams.filter(t => t.rank>=start && t.rank<=end
        && (!soloConf || t.conf===soloConf)
        && (!soloGroup || (teamGroup(curAge,t.name)||"")[0]===soloGroup)).length;
    const sel = soloTranche && soloTranche.min===start ? " selected":"";
    rankHtml += `<option value="${start}"${sel}>${start}\u2013${end} (${cnt})</option>`;
  }
  rankSel.innerHTML = rankHtml;
  rankSel.classList.toggle("active", !!soloTranche);

  // --- Playoff group / bracket dropdown (only when a draw exists) ---
  const gWrap = document.getElementById("filter-group-wrap");
  const gSel = document.getElementById("filter-group");
  const groupMap = GROUPS[curAge];
  if(groupMap){
    gWrap.classList.remove("hidden");
    document.getElementById("filter-group-label").textContent =
      isBracket(curAge) ? "Round of 16 matchup" : "Playoff group";
    const letters = [...new Set(Object.values(groupMap).map(g=>g[0]))].sort();
    const word = isBracket(curAge) ? "Match" : "Group";
    let gHtml = `<option value="">All ${isBracket(curAge)?"matchups":"groups"}</option>`;
    letters.forEach(L=>{
      const cnt = teams.filter(t => (teamGroup(curAge,t.name)||"")[0]===L
          && (!soloConf || t.conf===soloConf)
          && (!soloTranche || (t.rank>=soloTranche.min && t.rank<=soloTranche.max))).length;
      gHtml += `<option value="${L}"${soloGroup===L?" selected":""}>${word} ${L} (${cnt})</option>`;
    });
    gSel.innerHTML = gHtml;
    gSel.classList.toggle("active", !!soloGroup);
  } else {
    gWrap.classList.add("hidden");
  }



  document.getElementById("legend-reset").classList.toggle("hidden", !soloConf && !soloTranche && !soloGroup);
}

function renderTabs(){
  const wrap = document.getElementById("age-tabs");
  wrap.innerHTML = "";
  AGES.forEach(age=>{
    const b = document.createElement("button");
    b.className = "age-tab" + (age===curAge?" active":"");
    b.textContent = ageLabel(age);
    b.addEventListener("click",()=>{
      if(age===curAge) return;
      curAge = age;
      document.getElementById("age-label").textContent = ageLabel(age);
      refresh();
    });
    wrap.appendChild(b);
  });
}

function refresh(){ renderTabs(); renderLegend(); renderList(); renderMarkers(); }

document.getElementById("legend-reset").addEventListener("click",()=>{ soloConf=null; soloTranche=null; soloGroup=null; refresh(); });
document.getElementById("filter-conf").addEventListener("change",e=>{ soloConf = e.target.value || null; refresh(); });
document.getElementById("filter-rank").addEventListener("change",e=>{
  if(!e.target.value){ soloTranche = null; }
  else { const start = +e.target.value; soloTranche = {min:start, max:start+9}; }
  refresh();
});
document.getElementById("filter-group").addEventListener("change",e=>{ soloGroup = e.target.value || null; refresh(); });

document.getElementById("team-search").addEventListener("input",e=>{ searchQ=e.target.value.toLowerCase().trim(); renderList(); });

// --- Mobile drawer toggles ---
const mBody = document.body;
function closeMobileDrawers(){
  mBody.classList.remove("show-teams","show-filters");
  document.getElementById("m-teams-btn").classList.remove("on");
  document.getElementById("m-filters-btn").classList.remove("on");
}
function toggleDrawer(which){
  const cls = which==="teams" ? "show-teams" : "show-filters";
  const open = mBody.classList.contains(cls);
  closeMobileDrawers();
  if(!open){
    mBody.classList.add(cls);
    document.getElementById(which==="teams"?"m-teams-btn":"m-filters-btn").classList.add("on");
  }
}
document.getElementById("m-teams-btn").addEventListener("click",()=>toggleDrawer("teams"));
document.getElementById("m-filters-btn").addEventListener("click",()=>toggleDrawer("filters"));
document.getElementById("m-backdrop").addEventListener("click",closeMobileDrawers);

// --- Playoff venue marker (Surf Sports Park, San Diego) — persists across all filters ---
const VENUE = {
  name: "Surf Sports Park",
  sub: "ECNL Boys National Playoffs · Host Venue",
  city: "Del Mar / San Diego, CA",
  lat: 32.9840, lng: -117.2170,
  url: "https://theecnl.com/sports/2026/3/7/26%20B%20PLAYOFFS.aspx",
  logo: "https://dxbhsrqyrr690.cloudfront.net/sidearm.nextgen.sites/ecnlschool.sidearmsports.com/images/logos/site/site.png",
  logoWhite: "https://dxbhsrqyrr690.cloudfront.net/sidearm.nextgen.sites/ecnlschool.sidearmsports.com/images/responsive_2023/logo_main.svg"
};
let venueMarker = null;
function addVenueMarker(){
  if(venueMarker) venueMarker.remove();
  const el = document.createElement("div");
  el.className = "venue-marker";
  el.title = VENUE.name + " — open ECNL Playoffs page";
  el.innerHTML = `
    <svg class="venue-shield" viewBox="0 0 56 64" width="50" height="57" aria-label="ECNL venue">
      <path d="M28 2 L52 11 V32 C52 47 41 56 28 62 C15 56 4 47 4 32 V11 Z"
            fill="#6b7280" stroke="#374151" stroke-width="3"/>
      <image href="${VENUE.logoWhite}" xlink:href="${VENUE.logoWhite}" x="11" y="24" width="34" height="13"
             preserveAspectRatio="xMidYMid meet"/>
    </svg>`;
  el.addEventListener("click",(e)=>{ e.stopPropagation(); window.open(VENUE.url, "_blank", "noopener"); });
  venueMarker = new mapboxgl.Marker({element:el, anchor:"center"})
    .setLngLat([VENUE.lng, VENUE.lat])
    .setPopup(new mapboxgl.Popup({offset:34, closeButton:true, maxWidth:"250px"}).setHTML(`
      <div class="popup-inner">
        <div class="popup-header">
          <img class="popup-logo" src="${VENUE.logo}" alt="" style="background:#fff;">
          <div class="popup-title">
            <h4>${VENUE.name}</h4>
            <span class="popup-conf-tag" style="background:#003539;">Host Venue</span>
          </div>
        </div>
        <div class="popup-stats">
          <div class="popup-stat popup-home"><div class="popup-stat-label">Location</div><div class="popup-stat-value">${VENUE.city}</div></div>
          <div class="popup-stat popup-home"><div class="popup-stat-label">Event</div><div class="popup-stat-value" style="font-size:11px;">2025-26 ECNL Boys National Playoffs</div></div>
        </div>
        <a class="popup-venue-link" href="${VENUE.url}" target="_blank" rel="noopener">View Playoffs page &rarr;</a>
      </div>`))
    .addTo(map);
}

let fellBack = false;
map.on("error", (e)=>{
  const msg = (e && e.error && (e.error.status || e.error.message)) || "";
  if(!fellBack && (String(msg).includes("401") || String(msg).includes("403") || String(msg).toLowerCase().includes("style"))){
    fellBack = true;
    map.setStyle("mapbox://styles/mapbox/light-v11");
    map.once("style.load", ()=>{ refresh(); addVenueMarker(); });
  }
});
map.on("load", ()=>{ refresh(); addVenueMarker(); });
// render UI chrome immediately even before tiles finish
renderTabs(); renderLegend(); renderList();
// also build markers immediately — addTo(map) works even without tiles,
// so data-nonadv attributes are stamped and the fade button works on file:// too
renderMarkers();
</script>
<script>
(function(){
  // Wire up the fade button independently of Mapbox loading
  function wireFadeBtn(){
    var btn = document.getElementById("fade-elim-btn");
    if(!btn) return;
    btn.addEventListener("click", function(){
      var active = document.body.classList.toggle("fade-elim");
      this.classList.toggle("active", active);
      this.innerHTML = active ? "&#10005; Show all teams" : "&#11088; Advancing teams only";
      // Also update the JS state variable if it exists in scope
      try{ fadeEliminated = active; }catch(e){}
    });
  }
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", wireFadeBtn);
  } else {
    wireFadeBtn();
  }
})();
</script>
</body>
